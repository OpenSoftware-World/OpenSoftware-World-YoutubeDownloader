name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - "version.txt"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Read version
        id: version
        run: |
          echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Build EXE
        run: pyinstaller --onefile ytdownloader.py

      - name: Create package
        run: zip -r ytdownloader.zip dist/ version.txt

      - name: Generate Changelog
        run: |
          echo "## 🚀 Release v${{ steps.version.outputs.version }}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log -1 --pretty=format:"- %s" >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: yt${{ steps.version.outputs.version }}
          name: yt${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          files: |
            ytdownloader.zip
            version.txt
