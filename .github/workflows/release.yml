name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - "version.txt"

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = Get-Content version.txt
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build EXE
        run: |
          pyinstaller --onefile ResetSettings\reset_settings.py
          pyinstaller --noconsole ytdownloader.py

      - name: Create package
        shell: pwsh
        run: |
          $target = "package\ytdownloader"

          New-Item -ItemType Directory -Force -Path $target
          New-Item -ItemType Directory -Force -Path "$target\Lang"
          New-Item -ItemType Directory -Force -Path "$target\KeyboardShortcut"
          New-Item -ItemType Directory -Force -Path "$target\ResetSettings"
          New-Item -ItemType Directory -Force -Path "$target\Theme"
          New-Item -ItemType Directory -Force -Path "$target\TrayMenu"

          Copy-Item -Recurse -Force dist\ytdownloader\* $target\

          Copy-Item -Recurse -Force Icon $target\
          Copy-Item Lang\*.ini $target\Lang\
          Copy-Item KeyboardShortcut\*.ini $target\KeyboardShortcut\
          Copy-Item ResetSettings\*.ini $target\ResetSettings\
          Copy-Item Theme\*.ini $target\Theme\
          Copy-Item TrayMenu\*.ini $target\TrayMenu\

          Compress-Archive -Path $target -DestinationPath osw_ytdownloader_stable_ver.zip -Force

      - name: Generate Changelog
        shell: pwsh
        run: |
          "## 🚀 Release v${{ steps.version.outputs.version }}" | Out-File CHANGELOG.md
          "" | Out-File CHANGELOG.md -Append
          git log -1 --pretty=format:"- %s" | Out-File CHANGELOG.md -Append

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: yt${{ steps.version.outputs.version }}
          name: OpenSoftware-World YoutubeDownloader ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          files: |
            osw_ytdownloader_stable_ver.zip